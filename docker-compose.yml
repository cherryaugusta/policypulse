services:
  api:
    build:
      context: ./api
    environment:
      DJANGO_SETTINGS_MODULE: policypulse.settings
      DATABASE_URL: postgres://policypulse:policypulse@db:5432/policypulse
      REDIS_URL: redis://redis:6379/1
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: policypulse
      POSTGRES_USER: policypulse
      POSTGRES_PASSWORD: policypulse
    ports:
      - "5432:5432"
    volumes:
      - policypulse_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  policypulse_pg:
