repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: secret-scan-mock
        name: Secret Scan (mocked gitleaks)
        entry: python scripts/secret_scan_mock.py
        language: system
        pass_filenames: false
